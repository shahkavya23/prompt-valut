<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompttora Test Page</title>
  <style>
    body {
      margin: 0;
      background: #faf7f0;
      color: #25141b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    section {
      background: #fffefa;
      border: 1px solid rgba(36, 16, 24, .12);
      border-radius: 10px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 12px 30px rgba(44, 25, 30, .06);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid rgba(36, 16, 24, .18);
      border-radius: 8px;
      padding: 12px;
      font: inherit;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <main>
    <h1>Prompttora Test Page</h1>
    <section>
      <h2>Prompt-like content</h2>
      <p>Act as a senior AI/ML mentor. Create a 30-day study plan for learning machine learning with Python, including daily topics, mini projects, revision checkpoints, and interview practice questions.</p>
    </section>
    <section>
      <h2>Typing area</h2>
      <textarea placeholder="Click here after saving a prompt. Prompttora should show a floating Prompts button near this box."></textarea>
    </section>
  </main>
</body>
</html>
